<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  </head>
  <body>
    <div class="layout">

      <aside class="sidebar">
        <div class="sidebar-inner">
          <div class="sidebar-profile">
            <div class="avatar">RH</div>
            <h1 class="sidebar-name">{{ site.title }}</h1>
            <p class="sidebar-bio">{{ site.description }}</p>
          </div>

          <nav class="sidebar-nav">
            <a href="{{ '/' | relative_url }}" class="nav-item">Home</a>

            <div class="nav-dropdown">
              <span class="nav-item nav-parent">Research <span class="arrow">›</span></span>
              <div class="dropdown-menu">
                <a href="{{ '/research/white-dwarfs/' | relative_url }}">White Dwarfs</a>
                <a href="{{ '/research/nuclear-astrophysics/' | relative_url }}">Nuclear Astrophysics</a>
              </div>
            </div>

            <div class="nav-dropdown">
              <span class="nav-item nav-parent">Projects <span class="arrow">›</span></span>
              <div class="dropdown-menu">
                <a href="{{ '/projects/computational/' | relative_url }}">Computational</a>
                <a href="{{ '/projects/hardware/' | relative_url }}">Hardware</a>
                <a href="{{ '/projects/hobbies/' | relative_url }}">Hobbies</a>
              </div>
            </div>

            <a href="{{ '/talks/' | relative_url }}" class="nav-item">Talks</a>
          </nav>

          <div class="sidebar-links">
            <a href="https://github.com/" target="_blank">GitHub</a>
            <a href="mailto:you@email.com">Email</a>
          </div>
        </div>
      </aside>

      <main class="main-content">
        {{ content }}
      </main>

    </div>
  </body>
</html>
